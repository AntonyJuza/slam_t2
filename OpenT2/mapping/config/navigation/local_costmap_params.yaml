local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 15.0
  publish_frequency: 10.0
  rolling_window: true
  width: 4.0
  height: 4.0
  resolution: 0.03
  plugins: 
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}


  virtual_wall:
    map_topic: /virtual_wall
    virtual_wall_mode: true

  obstacle_layer:
    observation_sources: scan camera_1 bump
    scan: {sensor_frame: laser_link, observation_persistence: 0.0, max_obstacle_height: 5.0, min_obstacle_height: 0.0, data_type: LaserScan, topic: /scan_filtered}
    camera_1: {sensor_frame: camera_1_link, observation_persistence: 0.0, max_obstacle_height: 1.5, min_obstacle_height: 0.46, obstacle_range: 1.2, data_type: PointCloud2, topic: /camera_1/depth/points, expected_update_rate: 1.0, marking_allow_timeout: true, marking: true, clearing: true}
    camera_2: {sensor_frame: camera_2_link, observation_persistence: 0.0, max_obstacle_height: 1.5, min_obstacle_height: 0.46, obstacle_range: 1.2, data_type: PointCloud2, topic: /camera_2/depth/points, expected_update_rate: 1.0, marking_allow_timeout: true, marking: true, clearing: true}
    bump: {sensor_frame: base_link, observation_persistence: 0.0, max_obstacle_height: 1.0, min_obstacle_height: 0.1, data_type: PointCloud2, topic: /bump, expected_update_rate: 1.0, marking_allow_timeout: true, marking: true, clearing: true}
    obstacle_glow: false
    glow_depth: 7
    map_all_clear: false
    track_unknown_space: true
    use_maximum: false

  inflation_layer:
    cost_scaling_factor:  5.0
    inflation_radius:     0.5
    update_dist_with_cost: true

  static_layers:
    layers: 
      - {name: virtual_wall, type: "costmap_2d::StaticLayer"}
      - {name: mask_layer, type: "costmap_2d::MaskLayer"}
    virtual_wall:
      map_topic: /virtual_wall
      virtual_wall_mode: true
    mask_layer:
      mask_topic: /mask_map

  inflation_master_layer:
    cost_scaling_factor:  5.0
    inflation_radius:     0.5
    update_dist_with_cost: true