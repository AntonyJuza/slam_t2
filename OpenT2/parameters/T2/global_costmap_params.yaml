global_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 20.0
  publish_frequency: 10.0
  footprint_padding: 0.03
  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  static_layer:
    enabled:              false
    map_topic:            /map

  obstacle_layer:
    observation_sources: scan bump foot mx_camera_L mx_camera_R
    scan: {sensor_frame: laser_link, observation_persistence: 0.0, max_obstacle_height: 5.0, min_obstacle_height: 0.0, data_type: LaserScan, topic: /planner_scan}
    obstacle_glow: true
    glow_depth: 10
    map_all_clear: false
    track_unknown_space: true
    use_maximum: false

  inflation_layer:
    cost_scaling_factor:  5.0
    inflation_radius:     1.5
