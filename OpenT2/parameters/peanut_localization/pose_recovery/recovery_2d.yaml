tracking_recovery_matchers:
    point_matchers:
        iterative_closest_point_2d:
            convergence_time_limit_seconds: 0.5 #1.2
            max_correspondence_distance: 2.5 #2.0
            transformation_epsilon: 1e-6
            euclidean_fitness_epsilon: 1e-6
            max_number_of_registration_iterations: 80 #10
            max_number_of_ransac_iterations: 0 #10
            ransac_outlier_rejection_threshold: 0.05
            match_only_keypoints: false
            display_cloud_aligment: false
            maximum_number_of_displayed_correspondences: 0
            # gicp
            rotation_epsilon: 0.002
            correspondence_randomness: 50
            maximum_optimizer_iterations: 100 #100
            use_reciprocal_correspondences: false #true


transformation_validators_tracking_recovery:
    euclidean_transformation_validator:
        max_transformation_angle: 1.5
        max_transformation_distance: 1.5
        max_new_pose_diff_angle: 1.5
        max_new_pose_diff_distance: 1.5
        max_root_mean_square_error: 0.35 #0.05
        min_inliers_angular_distribution: 0.08
        max_outliers_percentage: 0.6
