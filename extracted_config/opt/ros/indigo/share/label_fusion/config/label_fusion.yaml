%YAML:1.0

robot_label_mode: 1 # 1 ๏ฟฝ๏ฟฝฤฃสฝ๏ฟฝ๏ฟฝ๏ฟฝิฑ๏ฟฝวฉ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝึฑ๏ฟฝืผ๏ฟฝ๏ฟฝวฉ๏ฟฝ๏ฟฝวฑ๏ฟฝืผ๏ฟฝ๏ฟฝวฉ
                    # 0 ๏ฟฝ๏ฟฝฤฃสฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝID๏ฟฝ๏ฟฝฮง๏ฟฝ๏ฟฝ๏ฟฝึฑ๏ฟฝืผ๏ฟฝ๏ฟฝวฉ๏ฟฝ๏ฟฝวฑ๏ฟฝืผ๏ฟฝ๏ฟฝวฉ
nonstandard_label_points: "" #๏ฟฝวฑ๏ฟฝืผ๏ฟฝ๏ฟฝวฉ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ,robot_label_mode 1 สฑสน๏ฟฝ๏ฟฝ
nonstandard_label_limit_number: 0  #๏ฟฝวฑ๏ฟฝืผ๏ฟฝ๏ฟฝวฉID๏ฟฝ๏ฟฝฮง,robot_label_mode 0 สฑสน๏ฟฝ๏ฟฝ                          
nonstandard_label_scale: 1.34 # ๏ฟฝวฑ๏ฟฝืผ๏ฟฝ๏ฟฝวฉ๏ฟฝ๏ฟฝ๏ฟฝลณ฿ถ๏ฟฝ

initial_mode: 1 # 2 double label or one special label(28662) initial location
                # 1 multi detect can initial  

label_save_path: "/home/peanut/label/"
label_rviz: 0   # 0 doesn't publish rvizVisualization msg of label
                # 1 publish rvizVisualization msg of label
detection_window_size: 15
specialLabelID: 28662
label_delay_time: 70 #label_camera process image cost time ms