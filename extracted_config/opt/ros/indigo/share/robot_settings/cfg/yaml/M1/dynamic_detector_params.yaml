converter_plugin: costmap_converter::CostmapToDynamicObstacles
costmap_topic: /move_base/local_costmap/costmap
odom_topic: /odom
scan_topic: /scan
world_frame: /odom
robot_base_frame: /base_link
range: 3.0
resolution: 0.03
dynamic_velocity_threshold: 0.01
alpha_slow: 0.3
alpha_fast: 0.85
beta: 0.85
min_occupancy_probability: 183
min_sep_between_slow_and_fast_filter: 120
max_occupancy_neighbors: 22
min_circularity: 0.2
max_circularity: 1.0
min_inertia_ratio: 0.01
max_intertia_ratio: 1.0
filter_by_convexity: false
min_convexity: 0
max_convexity: 1.0
dist_thresh: 20.0
limit_rate: 10.0
