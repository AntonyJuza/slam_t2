local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 15.0
  publish_frequency: 10.0
  rolling_window: true
  width: 4.0
  height: 4.0
  resolution: 0.03
  plugins: 
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: fdl_obs_cliff_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: fdl_obs_low_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
    - {name: static_layers, type: "costmap_2d::CombineLayer"}
    - {name: inflation_master_layer, type: "costmap_2d::InflationLayer"}


  virtual_wall:
    map_topic: /virtual_wall
    virtual_wall_mode: true

  obstacle_layer:
    observation_sources: scan bump gate mx_camera_L mx_camera_R suspend_obs_right suspend_obs_left fdl schedule_obstacle_position
    obstacle_glow: false
    glow_depth: 7
    map_all_clear: false
    track_unknown_space: true
    use_maximum: false

  fdl_obs_cliff_layer:
    observation_sources: fdl_obs_cliff
    obstacle_glow: false
    glow_depth: 7
    map_all_clear: false
    track_unknown_space: true
    use_maximum: false

  fdl_obs_low_layer:
    observation_sources: fdl_obs_low
    obstacle_glow: false
    glow_depth: 7
    map_all_clear: false
    track_unknown_space: true
    use_maximum: false

  inflation_layer:
    cost_scaling_factor:  5.0
    inflation_radius:     0.5
    update_dist_with_cost: true
    
  static_layers:
    layers: 
      - {name: virtual_wall, type: "costmap_2d::StaticLayer"}
      - {name: mask_layer, type: "costmap_2d::MaskLayer"}
    virtual_wall:
      map_topic: /virtual_wall
      virtual_wall_mode: true
    mask_layer:
      mask_topic: /mask_map

  inflation_master_layer:
    cost_scaling_factor:  5.0
    inflation_radius:     0.5
    update_dist_with_cost: true