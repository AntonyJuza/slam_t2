scan_filter_chain:
- name: shadows
  type: laser_filters/ScanShadowsFilter
  params:
    min_angle: 5
    max_angle: 175
    neighbors: 5
    window: 1
- name: intensity
  type: laser_filters/LaserScanIntensityFilter
  params:
    lower_threshold: 50
    upper_threshold: 100000
    disp_histogram: 0
